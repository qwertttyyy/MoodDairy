services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-moods}
      POSTGRES_USER: ${DB_USER:-moods}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-moods}
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-moods}"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
